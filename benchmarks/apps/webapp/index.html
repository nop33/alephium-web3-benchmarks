<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alephium Web3 SDK — Webapp Benchmark</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1a1a2e; background: #f8f9fa; line-height: 1.6; }
      .app { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }
      h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
      h2 { font-size: 1.3rem; margin-top: 2rem; margin-bottom: 0.5rem; border-bottom: 2px solid #e9ecef; padding-bottom: 0.25rem; }
      h3 { font-size: 1.05rem; margin-top: 1.25rem; margin-bottom: 0.25rem; color: #495057; }
      h4 { font-size: 0.95rem; margin-bottom: 0.15rem; }
      .subtitle { color: #6c757d; margin-bottom: 1rem; }
      .description { color: #6c757d; font-size: 0.85rem; margin-bottom: 0.75rem; }
      code { background: #e9ecef; padding: 0.1em 0.35em; border-radius: 3px; font-size: 0.85em; }
      dl { display: grid; grid-template-columns: auto 1fr; gap: 0.25rem 1rem; margin-bottom: 1rem; }
      dt { font-weight: 600; font-size: 0.9rem; color: #495057; }
      dd { word-break: break-all; }
      .mono { font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace; font-size: 0.85rem; }
      .small { font-size: 0.75rem; color: #6c757d; }
      input { width: 100%; padding: 0.5rem; border: 1px solid #dee2e6; border-radius: 4px; font-size: 0.9rem; font-family: monospace; margin-bottom: 0.75rem; }
      .check-item { margin-bottom: 1rem; padding: 0.75rem; background: #fff; border: 1px solid #e9ecef; border-radius: 6px; }
      .check-item h4 { margin-bottom: 0.25rem; }
      .result { display: block; word-break: break-all; font-size: 0.8rem; color: #495057; background: #f1f3f5; padding: 0.4rem 0.6rem; border-radius: 4px; margin-top: 0.35rem; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
